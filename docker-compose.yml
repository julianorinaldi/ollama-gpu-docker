services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    env_file:
      - .env
    environment:
      # Para permitir acesso por outros PCs na rede (LAN),
      # o Ollama precisa escutar em 0.0.0.0 dentro do container.
      # Observação: o .env deste repo define OLLAMA_HOST para o Open WebUI
      # (ex.: http://ollama:11434), então fazemos override aqui.
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./volumes/ollama:/root/.ollama

  open-webui:
      image: ghcr.io/open-webui/open-webui:main
      container_name: open-webui
      env_file:
        - .env
      ports:
        - "3000:8080"
      volumes:
        - ./volumes/open-webui:/app/backend/data
      depends_on:
        - ollama

