services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    env_file:
      - .env
    environment:
      # Permite que outros PCs na LAN acessem a API do Ollama.
      # Faz override do OLLAMA_HOST do .env (que é voltado ao Open WebUI).
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./volumes/ollama:/root/.ollama

  stable-diffusion:
      image: ghcr.io/ai-dock/stable-diffusion-webui:latest-cuda
      container_name: stable-diffusion
      ports:
        - "7860:7860"   # Interface/Proxy Caddy
        - "17860:17860" # Possível porta direta da API
        - "8888:8888"   # Porta comum em ai-dock para Jupyter/Config
      environment:
        - WEBUI_ARGS=--api --listen --xformers
        # Algumas imagens ai-dock exigem desativar a autenticação para uso em rede local
        - AUTH_ENABLE=false 
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      volumes:
        - ./volumes/sd-data:/workspace

  open-webui:
      image: ghcr.io/open-webui/open-webui:main
      container_name: open-webui
      env_file:
        - .env
      ports:
        - "3000:8080"
      volumes:
        - ./volumes/open-webui:/app/backend/data
      depends_on:
        - ollama
        - stable-diffusion      

